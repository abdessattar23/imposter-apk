name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          
      - name: Generate Platform Folders
        run: |
          mkdir temp_src
          mv lib temp_src/
          mv pubspec.yaml temp_src/
          flutter create --project-name chkon_l_7achar --platforms android .
          rm -rf lib
          mv temp_src/lib .
          mv temp_src/pubspec.yaml .
          rm -rf temp_src

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chkon-l-7achar-apk
          path: build/app/outputs/flutter-apk/app-release.apk
